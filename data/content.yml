########################### About ##################################
about:
  enable: true
  image: 'images/profile.png' 
  title: 'ABOUT ME'
  content: |
    I am a high school student passionate about mathematics, artificial intelligence, robotics, and scientific research.
    My journey began with robotics, where I discovered how software, engineering, and teamwork come together to solve real-world problems. Since then, I have expanded my interests into artificial intelligence, computational science, and mathematical thinking, always looking for opportunities to learn beyond the classroom.
    I enjoy building projects that combine technical depth with practical impact, whether developing robot software, exploring AI-driven solutions, or participating in research and engineering competitions. Beyond technical work, I value leadership, collaboration, and continuous learning, and I strive to create meaningful solutions while helping others grow alongside me.
  button:
    enable: false
    label: 'Explore My Journey'
    link: '#about'
    icon: 'fa-code'

########################### Current Focus ###########################
current_focus:
  enable: true
  title: 'Current Focus'
  content: |
    At the moment, I am focusing on strengthening my mathematical foundation, expanding my software engineering skills, and conducting research that connects artificial intelligence with real-world applications.
  items:
  - "Preparing for AP Calculus BC, Macro Economics and Micro Economics"
  - "Building AI-driven software projects"
  - "Leading FRC Team software development"
  - "Studying computational drug discovery"
  - "Developing research and engineering projects"

########################### Featured Projects ######################
featured_projects:
  enable: true
  title: 'Featured Projects'
  intro: 'A few projects that reflect my interests and growth.'
  projects:
    - name: 'AI for Computational Drug Discovery'
      description: 'Developing intelligent software that analyzes molecular information and assists early-stage drug discovery using artificial intelligence.'
      details: |
        This project combines Python, RDKit, molecular descriptors, and machine learning techniques to explore computational approaches to drug discovery.
        My goal is to understand how AI can support researchers by accelerating data analysis and decision making during the early stages of pharmaceutical research.
      link: '#'

    - name: "FRC Team Software"
      description: 'Designing reliable robot software for autonomous navigation, control systems, and competition performance.'
      details: |
        As a software lead within FIRST Robotics Competition, I develop robot software using Java and WPILib while collaborating with mechanical and electrical teams.
        My work focuses on autonomous systems, software architecture, and creating maintainable code under tight competition deadlines.
      link: '#'

    - name: 'Personal Portfolio'
      description: 'A continuously evolving portfolio documenting projects, research, and leadership experiences.'
      details: |
        This website serves as a central place to share my work, research interests, engineering projects, and experiences.
        Rather than simply listing achievements, it reflects my learning journey and the ideas I continue to explore.
      link: '#'

